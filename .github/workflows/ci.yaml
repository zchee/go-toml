# go-toml unit tests and static checks.
#
# Runs go vet plus the full test suite (including the -race -shuffle=on
# variant from AGENTS.md) on stable Go 1.26 resolved from go.mod. The
# matrix mirrors toml-test.yaml: amd64 SWAR and arm64 NEON backends;
# the GOEXPERIMENT=simd AVX2 leg is blocked until internal/scan tracks
# the upstream archsimd API.
name: ci

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'push' }}

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        runner:
          - ubuntu-24.04
          - ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Vet
        run: |
          go version
          go vet ./...

      - name: Test
        run: go test -count=1 ./...

      - name: Test with race detector
        run: |-
          go test -race -count=1 -shuffle=on ./...
